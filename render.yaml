services:
  - type: web
    name: p-folio-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: p-folio-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start

  - type: cron
    name: p-folio-keep-awake
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run keep-awake:once
    schedule: "*/10 * * * *"
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: KEEP_AWAKE_TARGET_URL
        fromService:
          type: web
          name: p-folio-server
          property: host
